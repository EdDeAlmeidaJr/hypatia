<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hypatia - Social network for readers and researchers</title>
    <link rel="icon" type="image/png" href="/img/hypatia_logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Italianno&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/bulma.css" />
    <link rel="stylesheet" href="/css/hypatia.css" />
  </head>
  <body>
    <section class="hero is-dark is-medium">
      <nav class="level">
        <div class="level-left">
          <div class="level-item">
            <img src="/img/hypatia_logo.png" class="logo-margins" />
          </div>
          <div class="level-item">
            <div>
              <p class="title hypatia-title">Hypatia</p>
              <p class="subtitle">
                The social network for readers and academic researchers
              </p>
            </div>
          </div>
        </div>
        <div class="level-right">
          <div class="level-item">
            <a href="/" class="button is-dark">Homepage</a>
          </div>
          <div class="level-item">
            <a href="/about.html" class="button is-dark">About Hypatia</a>
          </div>
          <div class="level-item">
            <a href="#signup-section" class="button is-dark">Signup</a>
          </div>
        </div>
      </nav>
    </section>
    <section id="signup-section" class="hero is-white is-meddium hero-signup">
      <div class="hero-body">
        <div class="container">
          <div class="columns is-centered">
            <div class="column is-full">
              <div class="box" style="padding: 0; overflow: hidden">
                <div class="columns is-gapless">
                  <!-- Left side - Background image (25%) -->
                  <div
                    class="column is-3"
                    style="
                      background-image: url(&quot;/img/signup.png&quot;);
                      background-size: cover;
                      background-position: center;
                      min-height: 500px;
                    "
                  ></div>

                  <!-- Right side - Form (75%) -->
                  <div class="column is-9" style="padding: 2rem">
                    <form id="signupForm" name="signupForm">
                      <div class="columns">
                        <div class="column is-6">
                          <div class="field">
                            <label class="label">Name</label>
                            <div class="control">
                              <input
                                class="input is-small"
                                type="text"
                                id="name"
                                placeholder="Your name"
                                required
                              />
                            </div>
                          </div>
                        </div>
                        <div class="column is-6">
                          <div class="field">
                            <label class="label">Email</label>
                            <div class="control">
                              <input
                                class="input is-small"
                                type="email"
                                id="email"
                                placeholder="you@example.com"
                                required
                              />
                            </div>
                          </div>
                        </div>
                      </div>

                      <div class="columns">
                        <div class="column is-6">
                          <div class="field">
                            <label class="label">Password</label>
                            <div class="control">
                              <input
                                class="input is-small" 
                                type="password"
                                id="password"
                                placeholder="********"
                                required
                              />
                            </div>
                          </div>
                        </div>
                        <div class="column is-6">
                          <div class="field">
                            <label class="label">Confirm Password</label>
                            <div class="control">
                              <input
                                class="input is-small"
                                type="password"
                                id="confirmPassword"
                                placeholder="********"
                                required
                              />
                            </div>
                          </div>
                        </div>
                      </div>

                      <div class="field">
                        <div class="control">
                          <button
                            type="submit"
                            class="button is-dark is-fullwidth is-medium"
                          >
                            Sign Up
                          </button>
                        </div>
                      </div>
                    </form>

                    <div class="has-text-centered mt-4">
                      <p class="mb-3">or</p>
                      <button class="button is-light is-fullwidth">
                        Sign up with Google
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <footer class="footer">
      <div class="content has-text-centered">
        <p>
          <strong>Hypatia</strong> - Social network for readers and academic
          researchers.
        </p>
        <p><small>© 2026 Hypatia. All rights reserved.</small></p>
      </div>
    </footer>
    <script src="/js/hypatia.js"></script>
  </body>
</html>
